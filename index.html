<!DOCTYPE html>
<html long="en" dir="ltr">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width , initial-scale=1.0"/>
        <title>shoe store</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
        crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
        <!-- navigation start -->
         <nav class="flex"> 
            <div class="cloumn flex-center">
                <div class="flex-center logo">
                    <h1>Shoe <span class="gradient-text">store </span></h1>
                    <i class="fa-solid fa-cart-plus"></i>
                </div> 
            </div>
               <input type="checkbox" id="sidebar-toggle" />
               <label for="sidebar-toggle" class="overlay"></label>
               <div class="column flex-center tabs sidebar">
                 <label for="sidebar-toggle" class="flex-center icon-wrapper cancel-btn">
                  <i class="fa-solid fa-xmark"></i>
                </label>
                    <a href="#home" class="tabs active">
                        <h4>Home</h4>
                    </a>
                    <a href="#home" class="tabs">
                        <h4>Home</h4>
                    </a>
                    <a href="#about" class="tabs">
                        <h4>about</h4>
                    </a>
                    <a href="#products" class="tabs">
                        <h4>products</h4>
                    </a>
                    <a href="#feedback" class="tabs">
                        <h4>feedback</h4>
                    </a>
                    <a href="#contact" class="tabs">
                        <h4>contact</h4>
                    </a>
                </div>          
            </div>
            <div class="column flex-center buttons-wrapper">
                <button class="flex-center btn search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <button class="flex-center btn search-btn">
                    <i class="fa-solid fa-cart-plus"></i>
                </button>
                <button class="btn primary contact-btn">start</button>
                <label for="sidebar-toggle" class="flex-center btn menu-btn">
                 <i class="fa-solid fa-bars"></i>
                </label>
            </div> 
         </nav>
        <!-- navigation end -->
        <script src="app.js"></script>
    </body>
</html>
